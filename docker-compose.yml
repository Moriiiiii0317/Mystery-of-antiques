version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/database.db:/app/database.db
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"   # 【新增】暴露 HTTPS 端口
    volumes:
      - ./ssl:/etc/nginx/ssl:ro   # 【新增】以只读模式挂载证书
    depends_on:
      - backend
    restart: unless-stopped
